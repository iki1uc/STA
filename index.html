<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>STA – Stationslage (iki1uc)</title>

<style>
  body { background:#000; color:#0f0; font-family:Consolas, monospace; padding:20px; }
  h1 { color:#6cf; }
  .box {
    background:#111;
    border:1px solid #333;
    padding:12px;
    margin:12px 0;
  }
  .ok { color:#00ff88; }
  .warn { color:#ffcc00; }
  .err { color:#ff4444; }
  a { color:#6cf; text-decoration:none; }
  a:hover { text-decoration:underline; }
</style>
</head>

<body>

<h1>STA – Stationslage</h1>

<p>Stations‑Achse: N → STA → IS → OUT → OI → IO → IN</p>
<p><a href="./time_3x11_scroll_zoom.html">Zeitmodul 3×11 öffnen</a></p>

<div id="out" class="box">Bereit…</div>

<script type="module">
// ------------------------------------------------------
// STA – iki1uc Stationsdaten
// ------------------------------------------------------
const STA = {
  name: "STA",
  axis: { x: 1, y: 0, z: 0, th: 2 },
  orbit: "N → STA → IS",
  status: "OK",
  respo: {
    OK: "OK",
    FLOW: "FLOW",
    ECHO: "ECHO",
    VOID: "VOID"
  },
  stamp: Date.now()
};

// ------------------------------------------------------
// Renderer
// ------------------------------------------------------
function renderSTA(){
  const out = document.getElementById("out");

  out.innerHTML = `
    <h2 class="ok">${STA.name}</h2>
    <p><b>Achse:</b> ${JSON.stringify(STA.axis)}</p>
    <p><b>Orbit:</b> ${STA.orbit}</p>
    <p><b>Status:</b> ${STA.status}</p>
    <p><b>RESPO:</b> ${JSON.stringify(STA.respo)}</p>
    <p><b>STAMP:</b> ${STA.stamp}</p>
  `;
}

// ------------------------------------------------------
// Start
// ------------------------------------------------------
renderSTA();
</script>

</body>
</html>
